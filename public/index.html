<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rulo AR</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Sora:wght@600;700&display=swap");

      :root {
        color-scheme: light dark;
        --space-xs: 4px;
        --space-sm: 8px;
        --space-md: 12px;
        --space-lg: 16px;
        --space-xl: 24px;
        --space-2xl: 32px;
        --radius-sm: 10px;
        --radius-md: 14px;
        --radius-lg: 18px;
        --shadow-soft: 0 8px 24px oklch(0.26 0.02 248 / 0.18);
        --bg: oklch(0.2 0.014 255);
        --surface: oklch(0.25 0.018 252);
        --surface-elevated: oklch(0.29 0.02 250);
        --border: oklch(0.38 0.018 252);
        --text: oklch(0.93 0.01 255);
        --text-muted: oklch(0.76 0.012 252);
        --brand: oklch(0.62 0.14 250);
        --brand-strong: oklch(0.56 0.16 252);
        --ok: oklch(0.73 0.14 155);
        --warn: oklch(0.78 0.16 88);
        --danger: oklch(0.68 0.18 28);
      }

      @media (prefers-color-scheme: light) {
        :root {
          --shadow-soft: 0 10px 26px oklch(0.5 0.02 252 / 0.12);
          --bg: oklch(0.975 0.006 252);
          --surface: oklch(0.99 0.004 252);
          --surface-elevated: oklch(0.965 0.01 252);
          --border: oklch(0.88 0.01 252);
          --text: oklch(0.29 0.02 252);
          --text-muted: oklch(0.5 0.014 252);
          --brand: oklch(0.54 0.15 250);
          --brand-strong: oklch(0.49 0.17 252);
          --ok: oklch(0.61 0.14 155);
          --warn: oklch(0.67 0.15 88);
          --danger: oklch(0.57 0.19 28);
        }
      }

      * { box-sizing: border-box; }

      body {
        font-family: "Manrope", "Segoe UI", Tahoma, sans-serif;
        max-width: 1120px;
        margin: 0 auto;
        padding: var(--space-xl) var(--space-lg) 90px;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }

      /* Skeleton Loading */
      .skeleton {
        position: relative;
        overflow: hidden;
        background-color: var(--surface-elevated);
        color: transparent !important;
        border-radius: 4px;
        min-width: 80px;
        display: inline-block;
      }
      .skeleton::after {
        content: "";
        position: absolute;
        top: 0; right: 0; bottom: 0; left: 0;
        transform: translateX(-100%);
        background-image: linear-gradient(90deg, rgba(255,255,255,0) 0, rgba(255,255,255,0.05) 20%, rgba(255,255,255,0.1) 60%, rgba(255,255,255,0));
        animation: shimmer 2s infinite;
      }
      @keyframes shimmer { 100% { transform: translateX(100%); } }

      /* Flash Highlights */
      @keyframes flash-up {
        0% { background-color: color-mix(in oklch, var(--ok) 30%, transparent); }
        100% { background-color: transparent; }
      }
      @keyframes flash-down {
        0% { background-color: color-mix(in oklch, var(--danger) 30%, transparent); }
        100% { background-color: transparent; }
      }
      .flash-up { animation: flash-up 1.2s ease-out; }
      .flash-down { animation: flash-down 1.2s ease-out; }

      .header {
        display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between;
        gap: var(--space-lg); margin-bottom: var(--space-lg);
      }

      .title-wrap h1 {
        margin: 0; font-family: "Sora", sans-serif; font-size: clamp(1.5rem, 3vw, 2rem); letter-spacing: -0.02em;
      }

      .toolbar { display: grid; gap: var(--space-sm); min-width: min(560px, 100%); }
      .capital-row { display: grid; grid-template-columns: auto minmax(160px, 1fr) auto auto; gap: var(--space-sm); align-items: center; }

      .input {
        background: var(--surface); border: 1px solid var(--border); color: var(--text);
        border-radius: var(--radius-sm); padding: 11px var(--space-md); font: inherit;
      }

      .btn {
        border: 1px solid color-mix(in oklch, var(--brand) 42%, var(--border));
        border-radius: var(--radius-sm); padding: 11px 14px; cursor: pointer; font-weight: 700;
        color: white; background: var(--brand); transition: all 160ms ease-out;
      }
      .btn:disabled { opacity: 0.6; cursor: not-allowed; filter: grayscale(0.5); }
      .btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: var(--shadow-soft); }

      .copy-btn {
        background: none; border: none; padding: 4px; cursor: pointer; color: var(--text-muted);
        opacity: 0.4; transition: all 0.2s; display: inline-flex; align-items: center; vertical-align: middle;
      }
      .copy-btn:hover { opacity: 1; color: var(--brand); }

      .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: var(--space-lg); box-shadow: var(--shadow-soft); }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: var(--space-md); margin-bottom: var(--space-lg); }
      .value { font-family: "Sora", sans-serif; font-size: 1.28rem; font-weight: 700; display: inline-block; padding: 2px 4px; border-radius: 4px; }

      .live-dot { width: 8px; height: 8px; background-color: var(--ok); border-radius: 50%; position: relative; }
      .live-dot::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--ok); border-radius: 50%; animation: pulse 2s infinite; }
      @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 70% { transform: scale(2.5); opacity: 0; } 100% { transform: scale(2.5); opacity: 0; } }
      .verdict-banner { width: 100%; border-radius: var(--radius-md); padding: var(--space-lg); margin-bottom: var(--space-md); font-weight: 800; text-align: center; }
      .verdict-optimal { background: var(--ok); color: white; }
      .verdict-nonoptimal { background: var(--danger); color: white; }
      .gain-card { margin-bottom: var(--space-lg); transition: all 180ms ease-out; }
      .gain-verde { border-color: var(--ok); background: color-mix(in oklch, var(--ok) 10%, var(--surface)); }
      .status { padding: 4px 8px; border-radius: 999px; font-size: 12px; font-weight: 700; }
      .open { background: color-mix(in oklch, var(--ok) 20%, transparent); color: var(--ok); }
      .closed { background: color-mix(in oklch, var(--danger) 20%, transparent); color: var(--danger); }
      .chip-btn { border: 1px solid var(--border); border-radius: 999px; padding: 6px 10px; background: var(--surface); color: var(--text-muted); font-size: 12px; font-weight: 700; cursor: pointer; }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="title-wrap">
        <h1>Rulo AR</h1>
        <div style="display:flex; align-items:center; gap:8px; color:var(--text-muted); font-size:13px">
          <div class="live-dot"></div>
          <span>TIEMPO REAL:</span> <span id="clock-display" style="font-weight:700; color:var(--text)">--:--:--</span>
        </div>
      </div>
      <div class="toolbar">
        <label style="font-size:12px; font-weight:700; color:var(--text-muted)">Capital para simular (ARS)</label>
        <div class="capital-row">
          <input id="capital" class="input" type="number" value="100000" />
          <button id="apply-capital" class="btn">Aplicar</button>
          <button id="refresh" class="btn">Actualizar</button>
        </div>
        <div class="quick-capital">
          <button class="chip-btn" data-capital="100000">100k</button>
          <button class="chip-btn" data-capital="500000">500k</button>
          <button class="chip-btn" data-capital="1000000">1M</button>
        </div>
      </div>
    </div>

    <div id="verdict-banner" class="verdict-banner verdict-nonoptimal">CARGANDO MERCADO...</div>

    <div class="card" style="margin-bottom: var(--space-lg); border-left: 4px solid var(--brand)">
      <div style="font-size:12px; color:var(--text-muted); margin-bottom:8px">RULO MÁS RENTABLE</div>
      <div id="route" class="value skeleton" style="font-size:1.5rem">Cargando oportunidad...</div>
      <ul id="steps" style="margin-top:16px; padding:0; list-style:none"></ul>
      <div style="margin-top:16px; display:flex; gap:8px">
        <button id="save-sim" class="btn">Guardar simulación</button>
        <button id="resolve-last" class="btn" style="background:var(--surface); color:var(--text); border:1px solid var(--border)">Resolver última</button>
      </div>
      <small id="simulation-note" style="display:block; margin-top:8px; color:var(--text-muted)"></small>
    </div>

    <div class="grid">
      <div class="card">
        <div>Venta MEP <button class="copy-btn" onclick="copyVal('mep')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button></div>
        <div id="mep" class="value skeleton">$ ---</div>
      </div>
      <div class="card">
        <div>Compra Blue <button class="copy-btn" onclick="copyVal('blue')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button></div>
        <div id="blue" class="value skeleton">$ ---</div>
      </div>
      <div class="card">
        <div>Compra Cripto <button class="copy-btn" onclick="copyVal('crypto')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button></div>
        <div id="crypto" class="value skeleton">$ ---</div>
      </div>
      <div class="card">
        <div>Spread Actual</div>
        <div id="spread" class="value skeleton">-- %</div>
      </div>
    </div>

    <div id="gain-card" class="card gain-card">
      <div>Ganancia estimada</div>
      <div id="gain" class="value skeleton" style="font-size:2rem">$ ---</div>
      <div id="market-state" class="status closed" style="float:right">CERRADO</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script>
      const fmt = (n) => new Intl.NumberFormat("es-AR", { maximumFractionDigits: 2, minimumFractionDigits: 2 }).format(n ?? 0);

      const copyVal = (id) => {
        const text = document.getElementById(id).innerText.replace('$ ', '').replace(/\./g, '').replace(',', '.');
        navigator.clipboard.writeText(text);
        const btn = event.currentTarget;
        const oldBody = btn.innerHTML;
        btn.innerHTML = '✓';
        setTimeout(() => btn.innerHTML = oldBody, 1000);
      };

      const updateValueWithFlash = (id, newValue, isCurrency = true) => {
        const el = document.getElementById(id);
        if (!el) return;
        const oldText = el.innerText.replace(/[^0-9,]/g, '').replace(',', '.');
        const oldVal = parseFloat(oldText) || 0;
        const newVal = parseFloat(newValue) || 0;

        el.classList.remove('skeleton', 'flash-up', 'flash-down');
        el.innerText = isCurrency ? `$ ${fmt(newVal)}` : `${fmt(newVal)}%`;

        if (newVal > oldVal && oldVal > 0) el.classList.add('flash-up');
        else if (newVal < oldVal && oldVal > 0) el.classList.add('flash-down');
      };

      const renderSnapshot = (data) => {
        updateValueWithFlash('mep', data.precioCompraMEP);
        updateValueWithFlash('blue', data.precioCompraBlue);
        updateValueWithFlash('crypto', data.precioCompraCripto);
        updateValueWithFlash('spread', data.spreadActualPct, false);
        updateValueWithFlash('gain', data.gananciaEstimada);

        const routeEl = document.getElementById('route');
        routeEl.classList.remove('skeleton');
        routeEl.innerText = data.bestOpportunity
          ? `${data.bestOpportunity.buyMarket} → ${data.bestOpportunity.sellMarket} (${fmt(data.bestOpportunity.rentabilityPct)}%)`
          : "Sin oportunidad rentable";

        const banner = document.getElementById('verdict-banner');
        banner.className = `verdict-banner ${data.marketOpen ? 'verdict-optimal' : 'verdict-nonoptimal'}`;
        banner.innerText = data.marketOpen ? "OPORTUNIDAD DETECTADA" : "MERCADO CERRADO O RIESGOSO";

        const state = document.getElementById('market-state');
        state.innerText = data.marketOpen ? "ABIERTO" : "CERRADO";
        state.className = `status ${data.marketOpen ? 'open' : 'closed'}`;
      };

      const setBtnLoading = (id, loading) => {
        const btn = document.getElementById(id);
        if (loading) {
          btn.dataset.oldText = btn.innerText;
          btn.innerText = 'Cargando...';
          btn.disabled = true;
        } else {
          btn.innerText = btn.dataset.oldText || btn.innerText;
          btn.disabled = false;
        }
      };

      const load = async () => {
        const cap = document.getElementById('capital').value;
        try {
          const res = await fetch(`/api/status?capital=${cap}`);
          const data = await res.json();
          renderSnapshot(data);
        } catch (e) {
          console.error("Error al cargar datos:", e);
        }
      };

      document.getElementById('refresh').onclick = async () => {
        setBtnLoading('refresh', true);
        await load();
        setBtnLoading('refresh', false);
      };

      document.getElementById('apply-capital').onclick = async () => {
        setBtnLoading('apply-capital', true);
        await load();
        setBtnLoading('apply-capital', false);
      };

      document.getElementById('save-sim').onclick = async () => {
        setBtnLoading('save-sim', true);
        const cap = document.getElementById('capital').value;
        try {
          await fetch("/api/simulations", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ capital: cap })
          });
          document.getElementById('simulation-note').innerText = "Simulación guardada con éxito.";
        } catch (e) {
          document.getElementById('simulation-note').innerText = "Error al guardar.";
        }
        setBtnLoading('save-sim', false);
      };

      document.getElementById('resolve-last').onclick = async () => {
        try {
          const listRes = await fetch("/api/simulations");
          const { items } = await listRes.json();
          const pending = items.find(x => x.status === 'pending');
          if (!pending) {
            document.getElementById('simulation-note').innerText = "No hay simulaciones pendientes.";
            return;
          }

          const res = await fetch(`/api/simulations/${pending.id}/resolve`, { method: "POST" });
          const result = await res.json();

          if (result.realizedGainArs > 0) {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#22c55e', '#ffffff'] });
          }
          document.getElementById('simulation-note').innerText = `Resultado: +$${fmt(result.realizedGainArs)}`;
        } catch (e) {
          console.error("Error al resolver:", e);
        }
      };

      for (const quickButton of document.querySelectorAll(".chip-btn")) {
        quickButton.onclick = () => {
          document.getElementById("capital").value = quickButton.dataset.capital;
          load();
        };
      }

      setInterval(() => {
        document.getElementById('clock-display').innerText = new Date().toLocaleTimeString("es-AR");
      }, 1000);

      load();
    </script>
  </body>
</html>
